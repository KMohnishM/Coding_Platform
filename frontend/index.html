<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hint Frontend</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Optional: Monaco CDN loader fallback for environments where monaco-editor package isn't loaded -->
    <script>
      // If Monaco isn't available at runtime, try to load from CDN and attach to window.monaco
      (function(){
        if (typeof window === 'undefined') return;
        if (window.monaco) return; // already available

        // Minimal loader: load monaco from unpkg (suitable for development)
        var script = document.createElement('script');
        script.src = 'https://unpkg.com/monaco-editor@0.39.0/min/vs/loader.js';
        script.onload = function(){
          if (window.require) {
            window.require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@0.39.0/min/vs' } });
            window.require(['vs/editor/editor.main'], function() {
              // Monaco will attach itself to window.monaco
              console.log('Monaco loaded from CDN');
            });
          }
        };
        document.head.appendChild(script);
      })();
    </script>
  </body>
</html>
